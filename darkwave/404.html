<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Darkwave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300..500;1,300..500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --text: #f0f0f0;
      --muted: #888;
      --gradient: linear-gradient(135deg, #8b3cf7, #e040fb, #5c6fff);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 {
      font-family: var(--font-head);
      font-size: clamp(24px, 4vw, 36px);
      margin-bottom: 16px;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 500px;
    }

    .btn {
      background: var(--gradient);
      color: #fff;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      transition: opacity .2s, transform .2s;
    }

    .btn:hover {
      opacity: .85;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Oops! Page Not Found</h2>
  <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
  <a href="/" class="btn">Return to Homepage</a>
</body>
</html>
